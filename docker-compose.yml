version: '3.9'

# docker-compose automatically reads .env from the same directory.
# The only file you edit on the server is .env — copy from .env.example.

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT}:8000"          # host:container — change API_PORT in .env only
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "8000"
      DB_ENGINE: postgresql
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}"
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: "https://${ADMIN_DOMAIN}"
      ADMIN_URL: "https://${ADMIN_DOMAIN}"
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      GOOGLE_REDIRECT_URI: "https://${API_DOMAIN}/api/admin/backup/drive/callback"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
      - frontend
    volumes:
      - ./data/uploads:/app/public

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        # Must be the public HTTPS URL — baked into the JS bundle at build time.
        # Do NOT use an internal Docker hostname here (causes Mixed Content errors).
        NEXT_PUBLIC_API_URL: "https://${API_DOMAIN}"
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT}:3000"        # host:container — change ADMIN_PORT in .env only
    networks:
      - frontend

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

# Data is stored at ./data/ on the host — survives docker-compose down and Docker removal.
